version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: watchtogether-db
    environment:
      POSTGRES_USER: watchtogether
      POSTGRES_PASSWORD: watchtogether_dev
      POSTGRES_DB: watchtogether
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
